name: Money Flow Daily

on:
  schedule:
    # 06:00 UTC is about 08:00 in Spain (summer). Change the time below if you like.
    - cron: '0 6 * * *'
  workflow_dispatch:   # adds a "Run workflow" button so you can test it instantly

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python money_flow_digest.py --no-email --push
